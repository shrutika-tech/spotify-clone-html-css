<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Spotify - Web Player: Music for everyone</title>
        <link rel="stylesheet" href="style.css">
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css" integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA==" crossorigin="anonymous" referrerpolicy="no-referrer">
        <link rel="icon" href="./assests/logo.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
       
        <div class="main">
            <div class="sidebar">
                <div class="nav">
                    <div class="nav-option" style="opacity: 1;">
                        <i class="fa-solid fa-house"></i>
                        <a href="#" >Home</a>
                    </div>
                    <div class="nav-option">
                       <i class="fa-solid fa-magnifying-glass"></i>
                        <a href="#" >Search</a>
                    </div>
                </div>

                <div class="library">
                    <div class="options">
                        <div class="lib-option nav-option">
                            <img src="./assests/library_icon.png"> 
                            <a href="#" >Your Library</a>
                        </div>
                        <div class="icons">
                            <i class="fa-solid fa-plus"></i>
                            <i class="fa-solid fa-arrow-right"></i>
                        </div>
                    </div>

                    <div class="lib-box">
                        <div class="box">
                            <div class="box-p1">Create your first playlist</div>
                            <div class="box-p2">It's easy, we'll help you</div>
                            <button class="badge"> Create playlist</button>
                        </div>

                        <div class="box">
                            <div class="box-p1">Let's find some podcasts to follow</div>
                            <div class="box-p2">We'll keep you updated on new episodes</div>
                            <button class="badge">Browse podcasts</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="main-content">main content</div>
            <div class="music-player">music player</div>

        </div>

    </body>
</html>
